<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tianchi Liu · 柳天驰</title>
  <meta name="description" content="Tianchi Liu (柳天驰) — Senior Researcher at Tencent Singapore. Speech GenAI, Speaker Recognition, Anti-Spoofing, Speech-LLM." />
  <link rel="icon" href="assets/img/favicon-32x32.png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- progress bar -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- ===================== NAV ===================== -->
  <header class="nav" id="nav">
    <div class="nav-inner">
      <a href="#hero" class="nav-brand">
        <span class="brand-mark">TL</span>
        <span class="brand-name" data-i18n="brand">Tianchi Liu</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="#news"     data-i18n="nav.news"></a>
        <a href="#research" data-i18n="nav.research"></a>
        <a href="#selected" data-i18n="nav.selected"></a>
        <a href="#pubs"     data-i18n="nav.pubs"></a>
        <a href="#life"     data-i18n="nav.life"></a>
      </nav>
      <div class="nav-actions">
        <button class="ctrl lang-toggle" id="langToggle" aria-label="Toggle language">
          <span class="lang-en">EN</span><span class="lang-sep">/</span><span class="lang-zh">中</span>
        </button>
        <button class="ctrl theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="ico-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4.5"/><g stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22"/><line x1="2" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22" y2="12"/><line x1="4.6" y1="4.6" x2="6.4" y2="6.4"/><line x1="17.6" y1="17.6" x2="19.4" y2="19.4"/><line x1="4.6" y1="19.4" x2="6.4" y2="17.6"/><line x1="17.6" y1="6.4" x2="19.4" y2="4.6"/></g></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
        <button class="ctrl menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main>
    <!-- ===================== HERO ===================== -->
    <section class="hero" id="hero">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-inner reveal">
        <div class="hero-photo">
          <img src="assets/img/avatar.png" alt="Tianchi Liu" />
          <div class="hero-photo-ring" aria-hidden="true"></div>
        </div>
        <div class="hero-text">
          <p class="hero-eyebrow" id="heroTagline"></p>
          <h1 class="hero-name">
            <span id="heroName"></span>
            <span class="hero-name-sub" id="heroNameSub"></span>
          </h1>
          <ul class="hero-roles" id="heroRoles"></ul>
          <p class="hero-bio" id="heroBio"></p>
          <div class="hero-cta">
            <a class="btn btn-primary" id="ctaEmail" href="#"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 5h18v14H3z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m3 6 9 7 9-7" fill="none" stroke="currentColor" stroke-width="1.6"/></svg><span data-i18n="misc.email"></span></a>
            <a class="btn btn-ghost" id="ctaScholar" href="#" target="_blank" rel="noopener"><span data-i18n="misc.scholar"></span></a>
            <a class="btn btn-ghost" id="ctaGithub" href="#" target="_blank" rel="noopener">GitHub</a>
          </div>
          <div class="hero-stats" id="heroStats"></div>
        </div>
      </div>
      <a href="#news" class="scroll-hint" aria-label="Scroll down"><span></span></a>
    </section>

    <!-- ===================== NEWS ===================== -->
    <section class="section" id="news">
      <div class="section-head reveal">
        <span class="section-kicker">01</span>
        <h2 class="section-title" data-i18n="sec.news"></h2>
      </div>
      <div class="news-list" id="newsList"></div>
    </section>

    <!-- ===================== RESEARCH ===================== -->
    <section class="section alt" id="research">
      <div class="section-head reveal">
        <span class="section-kicker">02</span>
        <h2 class="section-title" data-i18n="sec.research"></h2>
      </div>
      <div class="research-grid" id="researchGrid"></div>

      <div class="two-col">
        <div class="reveal">
          <h3 class="sub-title" data-i18n="sec.edu"></h3>
          <ul class="timeline" id="eduList"></ul>
        </div>
        <div class="reveal">
          <h3 class="sub-title" data-i18n="sec.exp"></h3>
          <ul class="timeline" id="expList"></ul>
        </div>
      </div>
    </section>

    <!-- ===================== SELECTED ===================== -->
    <section class="section" id="selected">
      <div class="section-head reveal">
        <span class="section-kicker">03</span>
        <h2 class="section-title" data-i18n="sec.selected"></h2>
      </div>
      <div class="selected-grid" id="selectedGrid"></div>
    </section>

    <!-- ===================== ALL PUBLICATIONS ===================== -->
    <section class="section alt" id="pubs">
      <div class="section-head reveal">
        <span class="section-kicker">04</span>
        <h2 class="section-title" data-i18n="sec.pubs"></h2>
      </div>
      <div class="pub-filters reveal" id="pubFilters"></div>
      <div class="pub-list" id="pubList"></div>
    </section>

    <!-- ===================== OPEN SOURCE + AWARDS + SERVICE ===================== -->
    <section class="section" id="misc">
      <div class="section-head reveal">
        <span class="section-kicker">05</span>
        <h2 class="section-title" data-i18n="sec.os"></h2>
      </div>
      <div class="os-grid" id="osGrid"></div>

      <div class="two-col" style="margin-top:3.5rem">
        <div class="reveal">
          <h3 class="sub-title" data-i18n="sec.awards"></h3>
          <ul class="award-list" id="awardList"></ul>
        </div>
        <div class="reveal">
          <h3 class="sub-title" data-i18n="sec.service"></h3>
          <ul class="service-roles" id="serviceRoles"></ul>
          <div class="reviewer-block">
            <h4 class="reviewer-title" data-i18n="misc.reviewer"></h4>
            <span class="reviewer-label" data-i18n="misc.reviewerJ"></span>
            <div class="chip-row" id="reviewerJ"></div>
            <span class="reviewer-label" data-i18n="misc.reviewerC"></span>
            <div class="chip-row" id="reviewerC"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===================== LIFE ===================== -->
    <section class="section alt" id="life">
      <div class="section-head reveal">
        <span class="section-kicker">06</span>
        <h2 class="section-title" data-i18n="sec.life"></h2>
      </div>
      <div class="hobby-grid" id="hobbyGrid"></div>
    </section>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-name" id="footerName">Tianchi Liu</span>
      <div class="footer-social">
        <a id="footScholar" href="#" target="_blank" rel="noopener" data-i18n="misc.scholar"></a>
        <a id="footGithub" href="#" target="_blank" rel="noopener">GitHub</a>
        <a id="footEmail" href="#" data-i18n="misc.email"></a>
      </div>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
